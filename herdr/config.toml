# herdr configuration
# https://herdr.dev/docs/configuration/
# スキーマ全体は `herdr --default-config` で確認できる。
# 変更後は `herdr server reload-config` で反映する。

[keys]
# 方針: デフォルトの prefix(ctrl+b) バインドは維持しつつ、
# ctrl+alt+X の直接チョードを併記してプレフィックスなしで操作できるようにする。
# ctrl+alt 系を選ぶ理由:
# - cmd 系は ghostty がターミナル層で消費して herdr に届かない
# - 素の ctrl+letter は zsh ウィジェット（ctrl+g/f/] 等）や readline と衝突する
# - herdr 公式も「explicit modified chords」を信頼できる直接バインドとして推奨
# ※ herdr は cmux 内では使わない想定のため、cmux のショートカットとの衝突は考慮しない

# --- Pane ---
focus_pane_left  = ["prefix+h", "ctrl+alt+h"]
focus_pane_down  = ["prefix+j", "ctrl+alt+j"]
focus_pane_up    = ["prefix+k", "ctrl+alt+k"]
focus_pane_right = ["prefix+l", "ctrl+alt+l"]
split_vertical   = ["prefix+v", "ctrl+alt+v"]
split_horizontal = ["prefix+minus", "ctrl+alt+s"]
close_pane       = ["prefix+x", "ctrl+alt+x"]
zoom             = ["prefix+z", "ctrl+alt+z"]
resize_mode      = ["prefix+r", "ctrl+alt+r"]

# --- Tab ---
new_tab      = ["prefix+c", "ctrl+alt+t"]
previous_tab = ["prefix+p", "ctrl+alt+left"]
next_tab     = ["prefix+n", "ctrl+alt+right"]
switch_tab   = ["prefix+1..9", "ctrl+alt+1..9"]

# --- Workspace ---
workspace_picker   = ["prefix+w", "ctrl+alt+w"]
previous_workspace = "ctrl+alt+up"
next_workspace     = "ctrl+alt+down"

# --- Misc ---
goto            = ["prefix+g", "ctrl+alt+g"]
edit_scrollback = ["prefix+e", "ctrl+alt+e"]
toggle_sidebar  = ["prefix+b", "ctrl+alt+b"]

[ui]
agent_panel_sort = "priority"
