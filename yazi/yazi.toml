# yazi configuration
# See: https://yazi-rs.github.io/docs/configuration/yazi

[manager]
ratio          = [1, 4, 3]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "none"
show_hidden    = true
show_symlink   = true
scrolloff      = 5
mouse_events   = ["click", "scroll"]
title_format   = "Yazi: {cwd}"

[preview]
tab_size       = 2
max_width      = 600
max_height     = 900
cache_dir      = ""
image_delay    = 30
image_filter   = "triangle"
image_quality  = 75
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
    { run = '$EDITOR "$@"', block = true, for = "unix" },
]
open = [
    { run = 'open "$@"', desc = "Open", for = "macos" },
]
reveal = [
    { run = 'open -R "$1"', desc = "Reveal in Finder", for = "macos" },
]
extract = [
    { run = 'unar "$1"', desc = "Extract here", for = "unix" },
]
play = [
    { run = 'mpv --force-window "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
    { name = "*/", use = ["edit", "open", "reveal"] },
    { mime = "text/*", use = ["edit", "reveal"] },
    { mime = "image/*", use = ["open", "reveal"] },
    { mime = "video/*", use = ["play", "reveal"] },
    { mime = "audio/*", use = ["play", "reveal"] },
    { mime = "inode/x-empty", use = ["edit", "reveal"] },
    { mime = "application/json", use = ["edit", "reveal"] },
    { mime = "*/javascript", use = ["edit", "reveal"] },
    { mime = "application/zip", use = ["extract", "reveal"] },
    { mime = "application/gzip", use = ["extract", "reveal"] },
    { mime = "application/x-tar", use = ["extract", "reveal"] },
    { mime = "application/x-bzip", use = ["extract", "reveal"] },
    { mime = "application/x-bzip2", use = ["extract", "reveal"] },
    { mime = "application/x-7z-compressed", use = ["extract", "reveal"] },
    { mime = "application/x-rar", use = ["extract", "reveal"] },
    { mime = "*", use = ["open", "reveal"] },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912  # 512MB
image_bound      = [0, 0]
suppress_preload = false

[plugin]
fetchers = [
    { id = "mime", name = "*", run = "mime", if = "!mime", prio = "high" },
]
preloaders = [
    { name = "*/", run = "folder", prio = "normal" },
    { mime = "image/svg+xml", run = "svg" },
    { mime = "image/*", run = "image" },
    { mime = "video/*", run = "video" },
    { mime = "application/pdf", run = "pdf" },
    { name = "*.md", run = "code" },
]
previewers = [
    { name = "*/", run = "folder" },
    { mime = "text/*", run = "code" },
    { mime = "image/svg+xml", run = "svg" },
    { mime = "image/*", run = "image" },
    { mime = "video/*", run = "video" },
    { mime = "application/json", run = "json" },
    { mime = "application/pdf", run = "pdf" },
    { name = "*.md", run = "code" },
    { name = "*.ipynb", run = "jupyter" },
    { mime = "*/javascript", run = "code" },
    { mime = "application/x-sh", run = "code" },
    { mime = "application/x-python-code", run = "code" },
]

[input]
cursor_blink = false

[select]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]

[which]
sort_by        = "none"
sort_sensitive = false
sort_reverse   = false
sort_translit  = false

[log]
enabled = false
